http:
  port: "8081"
  basePath: "/api/v1"

services:
  erp:
    host: "localhost"
    port: "3001"
    basePath: "/api"
    timeout: "10000"
  crm:
    host: "localhost"
    port: "3002"
    basePath: "/api"
    timeout: "8000"
  warehouse:
    host: "localhost"
    port: "3003"
    basePath: "/api"
    timeout: "6000"
  analytics:
    host: "localhost"
    port: "3004"
    basePath: "/api"
    timeout: "5000"

rabbitmq:
  host: "localhost"
  port: "5672"
  username: "orderpulse"
  password: "orderpulse123"
  virtualHost: "/"
  queues:
    orderProcessing: "orderpulse.order.processing"
    deadLetter: "orderpulse.dead.letter"
    notifications: "orderpulse.notifications"
    retry: "orderpulse.retry"

retry:
  maxAttempts: "3"
  initialInterval: "1000"
  multiplier: "2.0"
  maxInterval: "8000"

circuitBreaker:
  threshold: "3"
  timeout: "30000"
  halfOpenAfter: "60000"

cors:
  allowedOrigins: "*"
  allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
  allowedHeaders: "Content-Type,Authorization,x-correlation-id,x-source-system,x-api-key"
  
api.cors.origin: "http://localhost:3000"